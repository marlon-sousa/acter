<!doctype html>
<!-- Role: view (main window) — declarative HTML, one file per window. The static
     semantic skeleton (roles, labels, live region) lives here so it is inspectable
     without executing anything; dynamic DOM behavior lives only in src/adapters/. -->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Acter</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <main>
      <div id="results" role="region" aria-label="Results" tabindex="-1"></div>
      <form id="command-form">
        <label for="command-input">Command input</label>
        <input
          id="command-input"
          type="text"
          autocomplete="off"
          autocapitalize="off"
          spellcheck="false"
        />
      </form>
    </main>
    <!-- The live region lives at the very end of the document, outside <main>, and
         never moves. It must stay in the accessibility tree to be announced, so its
         text is browse-mode reachable while present; placing it last keeps it out of
         the most-travelled path (last command heading -> edit field), and the
         announcer adapter empties it shortly after each announcement. -->
    <div id="announcer" aria-live="polite" class="visually-hidden"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
